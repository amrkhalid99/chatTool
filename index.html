<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ FAST REPLY · saved replies hub</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Rubik + Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rubik', 'Roboto', sans-serif;
        }

        :root {
            --bg: #f6f9fc;
            --surface: #ffffff;
            --surface-hover: #f2f5f9;
            --border: #e2e8f0;
            --text-primary: #1a2b3e;
            --text-secondary: #4a5a6e;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --danger: #dc2626;
            --success: #059669;
            --warning: #d97706;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --card-shadow: 0 2px 8px rgba(0,0,0,0.02), 0 4px 12px rgba(0,0,0,0.03);
            --pinned-star: #fbbf24;
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #2d3a4f;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #b0c4de;
            --accent: #3b82f6;
            --accent-soft: #1e3a5f;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            --card-shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            transition: background-color 0.2s, color 0.2s;
            min-height: 100vh;
            padding: 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Nav Bar */
        .nav-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 0.75rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: var(--card-shadow);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(145deg, var(--accent), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        /* Search in Nav */
        .nav-search {
            display: flex;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            align-items: center;
            gap: 8px;
            min-width: 280px;
        }

        .nav-search i {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .nav-search input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
        }

        .nav-search input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .clear-search-nav {
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .clear-search-nav:hover {
            color: var(--danger);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .stats-mini {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .stats-mini span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Action Buttons in Nav */
        .nav-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn:hover {
            background: var(--surface-hover);
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        /* Compact Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .stat-icon {
            background: var(--accent-soft);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1rem;
        }

        .stat-content h3 {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-content p {
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* Category Pills */
        .category-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
            align-items: center;
        }

        .category-pill {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-pill:hover {
            background: var(--surface-hover);
            border-color: var(--accent);
        }

        .category-pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .category-pill.all-pill {
            background: var(--accent-soft);
            border-color: var(--accent);
        }

        /* Replies Grid - Responsive */
        .replies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .reply-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: var(--card-shadow);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .reply-card:hover {
            box-shadow: var(--shadow);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .title-section {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            flex: 1;
        }

        .pinned-icon {
            color: var(--pinned-star);
            font-size: 1rem;
            cursor: pointer;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 2;
        }

        .pinned-icon:hover {
            transform: scale(1.1);
        }

        .reply-title {
            font-weight: 600;
            font-size: 1rem;
            font-weight: normal;
            color: var(--text-primary);
            padding-right: 1.5rem;
        }

        .category-badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .reply-content {
            background: var(--bg);
            padding: 0.8rem;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-word;
            max-height: 100px;
            overflow-y: auto;
            line-height: 1.5;
            border: 1px solid var(--border);
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 8px;
        }

        .usage-info {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--surface-hover);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .modal h2 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            border-left: 6px solid var(--success);
            padding: 1rem 2rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 1rem;
            transform: translateY(200%);
            transition: 0.3s;
            z-index: 1200;
            border: 1px solid var(--border);
        }

        .toast.show {
            transform: translateY(0);
        }

        hr {
            border: 0.5px solid var(--border);
            margin: 1.5rem 0 1rem;
        }

        @media (max-width: 1024px) {
            .nav-left {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
                width: 100%;
            }
            
            .nav-search {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .nav-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .nav-actions {
                justify-content: space-between;
            }
            
            .replies-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Nav Bar -->
    <div class="nav-bar">
        <div class="nav-left">
            <div class="logo">
                <h1>⚡ FAST REPLY</h1>
            </div>
            
            <!-- Search in Nav Bar -->
            <div class="nav-search">

                <input type="text" id="searchInput" placeholder="Search replies... (Ctrl+F)" autofocus>
                <i class="fas fa-times clear-search-nav" id="clearSearch"></i>
            </div>
        </div>
        
        <div class="nav-actions">
            <div class="stats-mini">
                <span><i class="fas fa-message"></i> <span id="totalRepliesMini">0</span></span>
                <span><i class="fas fa-star" style="color: var(--pinned-star);"></i> <span id="pinnedCountMini">0</span></span>
                <span><i class="fas fa-copy"></i> <span id="totalClicksMini">0</span></span>
            </div>
            
            <div class="nav-buttons">
                <button class="btn" id="importBtn" title="Import JSON"><i class="fas fa-upload"></i> Import</button>
                <button class="btn" id="exportBtn" title="Export JSON"><i class="fas fa-download"></i> Export</button>
                <button class="btn btn-primary" id="addReplyBtn"><i class="fas fa-plus"></i> New</button>
            </div>
            
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun"></i>
                <span>🌓</span>
            </div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="importFile" accept="application/json" style="display: none;">

            <div class="stat-icon"><i class="fas fa-message"></i></div>
            <div class="stat-content">

    <!-- Category Pills -->

<!-- Toast -->
<div id="toast" class="toast"><i class="fas fa-check-circle" style="color: var(--success);"></i> <span>Copied to clipboard!</span></div>

<!-- Modal -->
<div class="modal-overlay" id="replyModal">
    <div class="modal">
        <h2 id="modalTitle">➕ Add new reply</h2>
        <input type="text" id="modalTitleInput" placeholder="Title" autocomplete="off">
        <textarea id="modalContentInput" rows="4" placeholder="Reply text..."></textarea>
        <input type="text" id="modalCategoryInput" placeholder="Category">
        <div class="modal-actions">
            <button class="btn" id="modalCancel">Cancel</button>
            <button class="btn btn-primary" id="modalSave">Save</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const STORAGE_KEY = 'fastReplyData';
        
        // Sample data
        const defaultReplies = [
            { id: '1', title: '👋 Welcome', content: 'Hello! Thank you for contacting support. How may I assist you today?', category: 'support', usageCount: 24, pinned: true, createdAt: Date.now() - 100000 },
            { id: '2', title: '📦 Order', content: 'Your order #{order} is being processed.', category: 'orders', usageCount: 18, pinned: false, createdAt: Date.now() - 200000 },
            { id: '3', title: '🤝 Thanks', content: 'Thanks for reaching out! Have a wonderful day 😊', category: 'friendly', usageCount: 42, pinned: true, createdAt: Date.now() - 50000 },
        ];

        // Load data
        let replies = [];
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            replies = stored ? JSON.parse(stored) : defaultReplies;
        } catch (e) {
            replies = defaultReplies;
        }

        // DOM elements
        const container = document.getElementById('repliesContainer');
        const searchInput = document.getElementById('searchInput');
        const clearSearch = document.getElementById('clearSearch');
        const categoryPills = document.getElementById('categoryPills');
        const themeToggle = document.getElementById('themeToggle');
        const toast = document.getElementById('toast');
        const modalOverlay = document.getElementById('replyModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalTitleInput = document.getElementById('modalTitleInput');
        const modalContentInput = document.getElementById('modalContentInput');
        const modalCategoryInput = document.getElementById('modalCategoryInput');
        const modalCancel = document.getElementById('modalCancel');
        const modalSave = document.getElementById('modalSave');
        const addReplyBtn = document.getElementById('addReplyBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const importFile = document.getElementById('importFile');

        // Stats elements
        const totalRepliesEl = document.getElementById('totalReplies');
        const pinnedCountEl = document.getElementById('pinnedCount');
        const totalClicksEl = document.getElementById('totalClicks');
        const mostUsedEl = document.getElementById('mostUsed');
        
        // Mini stats
        const totalRepliesMini = document.getElementById('totalRepliesMini');
        const pinnedCountMini = document.getElementById('pinnedCountMini');
        const totalClicksMini = document.getElementById('totalClicksMini');

        let currentEditId = null;
        let selectedCategory = 'all';

        function saveReplies() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(replies));
            render();
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }

        function rebuildCategoryPills() {
            const categories = ['all', ...new Set(replies.map(r => r.category))].sort();
            let html = '';
            categories.forEach(cat => {
                const displayName = cat === 'all' ? 'All' : cat;
                html += `<span class="category-pill ${cat === 'all' ? 'all-pill' : ''} ${selectedCategory === cat ? 'active' : ''}" data-category="${cat}">${displayName}</span>`;
            });
            categoryPills.innerHTML = html;
        }

        function updateStats() {
            const total = replies.length;
            const pinned = replies.filter(r => r.pinned).length;
            const totalClicks = replies.reduce((acc, r) => acc + (r.usageCount || 0), 0);
            const mostUsedReply = replies.reduce((max, r) => (r.usageCount > (max?.usageCount || 0) ? r : max), null);

            totalRepliesEl.innerText = total;
            pinnedCountEl.innerText = pinned;
            totalClicksEl.innerText = totalClicks;
            mostUsedEl.innerText = mostUsedReply ? mostUsedReply.title.substring(0, 10) + '…' : 'N/A';

            totalRepliesMini.innerText = total;
            pinnedCountMini.innerText = pinned;
            totalClicksMini.innerText = totalClicks;
        }

        function render() {
            const searchTerm = searchInput.value.toLowerCase();

            let filtered = replies.filter(r => {
                const matchesSearch = r.title.toLowerCase().includes(searchTerm) || r.content.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'all' || r.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            filtered.sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return b.usageCount - a.usageCount;
            });

            let html = '';
            filtered.forEach(reply => {
                const shortUsage = reply.usageCount || 0;
                html += `
                <div class="reply-card" data-id="${reply.id}">
                    <i class="fa${reply.pinned ? 's' : 'r'} fa-star pinned-icon" data-id="${reply.id}" data-pin-action></i>
                    <div class="card-header">
                        <div class="title-section">
                            <span class="reply-title">${escapeHtml(reply.title)}</span>
                            <span class="category-badge">${escapeHtml(reply.category)}</span>
                            <span class="usage-info"><i class="far fa-copy"></i> ${shortUsage}</span>
                        </div>
                    </div>
                    <div class="reply-content">${escapeHtml(reply.content)}</div>
                    <div class="card-footer"></div>
                </div>`;
            });
            container.innerHTML = html || '<div style="grid-column:1/-1; text-align:center; padding:2rem;">✨ No replies match</div>';

            rebuildCategoryPills();
            updateStats();
        }

        async function handleCopy(id) {
            const reply = replies.find(r => r.id === id);
            if (!reply) return;
            try {
                await navigator.clipboard.writeText(reply.content);
                reply.usageCount = (reply.usageCount || 0) + 1;
                saveReplies();
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            } catch (err) {
                // alert('Copy failed');
            }
        }

        function togglePin(id) {
            const reply = replies.find(r => r.id === id);
            if (reply) {
                reply.pinned = !reply.pinned;
                saveReplies();
            }
        }

        function openModal(editId = null) {
            currentEditId = editId;
            if (editId) {
                const r = replies.find(r => r.id === editId);
                if (r) {
                    modalTitle.innerText = 'Edit reply';
                    modalTitleInput.value = r.title;
                    modalContentInput.value = r.content;
                    modalCategoryInput.value = r.category;
                }
            } else {
                modalTitle.innerText = 'Add new reply';
                modalTitleInput.value = '';
                modalContentInput.value = '';
                modalCategoryInput.value = '';
            }
            modalOverlay.classList.add('show');
        }

        function saveModal() {
            const title = modalTitleInput.value.trim();
            const content = modalContentInput.value.trim();
            const category = modalCategoryInput.value.trim() || 'uncategorized';
            if (!title || !content) {
                alert('Title & content required');
                return;
            }
            if (currentEditId) {
                const r = replies.find(r => r.id === currentEditId);
                if (r) {
                    r.title = title;
                    r.content = content;
                    r.category = category;
                }
            } else {
                const newId = Date.now().toString() + Math.random().toString(36).substring(2);
                replies.push({
                    id: newId,
                    title,
                    content,
                    category,
                    usageCount: 0,
                    pinned: false,
                    createdAt: Date.now()
                });
            }
            saveReplies();
            modalOverlay.classList.remove('show');
        }

        function exportData() {
            const dataStr = JSON.stringify(replies, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `replies-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        replies = imported;
                        saveReplies();
                    } else throw new Error('not array');
                } catch (er) {
                    alert('Invalid JSON file');
                }
            };
            reader.readAsText(file);
        }

        // Event Listeners
        document.addEventListener('click', (e) => {
            const card = e.target.closest('.reply-card');
            if (card && !e.target.closest('[data-pin-action]')) {
                const id = card.dataset.id;
                handleCopy(id);
            }

            if (e.target.closest('[data-pin-action]')) {
                e.stopPropagation();
                const id = e.target.closest('[data-pin-action]').dataset.id;
                togglePin(id);
            }
        });

        categoryPills.addEventListener('click', (e) => {
            const pill = e.target.closest('.category-pill');
            if (pill) {
                selectedCategory = pill.dataset.category;
                render();
            }
        });

        clearSearch.addEventListener('click', () => {
            searchInput.value = '';
            render();
            searchInput.focus();
        });

        searchInput.addEventListener('input', render);

        // Ctrl+F to focus search
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                searchInput.focus();
                searchInput.select();
            }
        });

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }

        addReplyBtn.addEventListener('click', () => openModal());
        modalCancel.addEventListener('click', () => modalOverlay.classList.remove('show'));
        modalSave.addEventListener('click', saveModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('show');
        });

        exportBtn.addEventListener('click', exportData);
        importBtn.addEventListener('click', () => importFile.click());
        importFile.addEventListener('change', (e) => {
            if (e.target.files[0]) importFromFile(e.target.files[0]);
        });

        // Initial render
        rebuildCategoryPills();
        render();
    })();
</script>
</body>
</html>
